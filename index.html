<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>销售客户管理系统</title>
  <link rel="stylesheet" href="style.css?v=202605052209">
</head>
<body>
<div class="app-layout">

  <!-- 移动端顶部导航 -->
  <header class="mobile-header" id="mobile-header">
    <button class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleMobileMenu()" aria-label="打开菜单">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    <div class="mobile-header-title" id="mobile-header-title">工作台</div>
    <!-- 同步按钮 -->
    <button onclick="syncNow()" title="同步数据" class="mobile-header-btn" aria-label="同步数据" id="mobile-sync-top-btn">
      <svg id="sync-icon-top" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
    </button>
    <!-- 齿轮设置按钮 -->
    <button onclick="navigateTo('settings')" title="系统设置" class="mobile-header-btn" aria-label="系统设置">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </header>

  <!-- 侧边栏遮罩层（移动端） -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeMobileMenu()"></div>

  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img id="site-logo" src="" alt="logo">
      <div class="logo-icon">📊</div>
      <div id="site-title">销售客户管理系统</div>
      <button class="sidebar-close-btn" id="sidebar-close-btn" onclick="closeMobileMenu()" aria-label="关闭菜单">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="nav-section">核心功能</div>
    <div class="nav-item active" data-page="dashboard" onclick="navigateTo('dashboard')">
      <span class="nav-icon">🏠</span> 工作台
    </div>
    <div class="nav-item" data-page="customers" onclick="navigateTo('customers')">
      <span class="nav-icon">👥</span> 客户管理
    </div>
    <div class="nav-item" data-page="orders-software" onclick="navigateTo('orders-software')">
      <span class="nav-icon">💾</span> 软件订单
    </div>
    <div class="nav-item" data-page="orders-hardware" onclick="navigateTo('orders-hardware')">
      <span class="nav-icon">💻</span> 硬件订单
    </div>
    <div class="nav-item" data-page="cards" onclick="navigateTo('cards')">
      <span class="nav-icon">🔑</span> 卡密库
    </div>

    <div class="nav-section">商品与数据</div>
    <div class="nav-item" data-page="products" onclick="navigateTo('products')">
      <span class="nav-icon">📦</span> 商品管理
    </div>
    <div class="nav-item" data-page="product-sales" onclick="navigateTo('product-sales')">
      <span class="nav-icon">📊</span> 产品销售
    </div>
    <div class="nav-item" data-page="stats" onclick="navigateTo('stats')">
      <span class="nav-icon">📈</span> 数据统计
    </div>

    <div class="nav-section">系统</div>
    <div class="nav-item" data-page="settings" onclick="navigateTo('settings')">
      <span class="nav-icon">⚙️</span> 系统设置
    </div>

    <!-- 快捷功能（桌面端） -->
    <div class="sidebar-bottom">
      <button onclick="syncNow()" title="同步云端数据" class="sidebar-sync-btn" style="background:var(--bg-hover);border:1px solid var(--border);border-radius:6px;padding:6px 10px;cursor:pointer;color:var(--text-secondary);font-size:14px;display:flex;align-items:center;gap:6px;width:100%;justify-content:center;">
        <svg id="sidebar-sync-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        <span id="sidebar-sync-text">同步数据</span>
      </button>
      <button onclick="cycleTheme()" title="切换主题" style="background:var(--bg-hover);border:1px solid var(--border);border-radius:6px;padding:6px 10px;cursor:pointer;color:var(--text-secondary);font-size:16px;" id="theme-toggle-icon-dt">🌙</button>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="main-content" id="main-content">
    <div id="page-dashboard" class="page-section"></div>
    <div id="page-customers" class="page-section" style="display:none"></div>
    <div id="page-orders" class="page-section" style="display:none"></div>
    <div id="page-cards" class="page-section" style="display:none"></div>
    <div id="page-products" class="page-section" style="display:none"></div>
    <div id="page-product-sales" class="page-section" style="display:none"></div>
    <div id="page-stats" class="page-section" style="display:none"></div>
    <div id="page-settings" class="page-section" style="display:none"></div>
  </main>
</div>

<!-- 移动端底部导航（横向滚动单排，两字标注，6项精简版） -->
<nav class="mobile-bottom-nav" id="mobile-bottom-nav">
  <div class="mobile-nav-item" data-page="dashboard" onclick="navigateTo('dashboard')">
    <span class="mobile-nav-icon">🏠</span>
    <span>工作台</span>
  </div>
  <div class="mobile-nav-item" data-page="customers" onclick="navigateTo('customers')">
    <span class="mobile-nav-icon">👥</span>
    <span>客户</span>
  </div>
  <div class="mobile-nav-item" data-page="orders-software" onclick="navigateTo('orders-software')">
    <span class="mobile-nav-icon">💾</span>
    <span>软件</span>
  </div>
  <div class="mobile-nav-item" data-page="orders-hardware" onclick="navigateTo('orders-hardware')">
    <span class="mobile-nav-icon">💻</span>
    <span>硬件</span>
  </div>
  <div class="mobile-nav-item" data-page="cards" onclick="navigateTo('cards')">
    <span class="mobile-nav-icon">🔑</span>
    <span>卡密</span>
  </div>
  <div class="mobile-nav-item" data-page="stats" onclick="navigateTo('stats')">
    <span class="mobile-nav-icon">📈</span>
    <span>统计</span>
  </div>
</nav>

<!-- JS模块加载（顺序很重要） -->
<script src="核心工具.js?v=202605052209"></script>
<script src="工作台.js?v=202605052209"></script>
<script src="客户管理.js?v=202605052209"></script>
<script src="订单管理.js?v=202605052209"></script>
<script src="卡密库.js?v=202605052209"></script>
<script src="商品管理.js?v=202605052209"></script>
<script src="产品销售.js?v=202605052209"></script>
<script src="数据统计.js?v=202605052209"></script>
<script src="系统设置.js?v=202605052209"></script>
<script src="扩展功能.js?v=202605052209"></script>

<script>
// 移动端菜单控制
function toggleMobileMenu() {
  var sidebar = document.getElementById('sidebar');
  var overlay = document.getElementById('sidebar-overlay');
  var isOpen = sidebar.classList.contains('mobile-open');
  if (isOpen) {
    closeMobileMenu();
  } else {
    sidebar.classList.add('mobile-open');
    overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
  }
}

function closeMobileMenu() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

// navigateTo 重写：处理页面渲染 + 移动端菜单关闭 + 更新标题和导航激活状态
var _origNavigateTo = navigateTo;
navigateTo = function(page) {
  // 先调用原始函数（处理页面显示/隐藏）
  _origNavigateTo(page);

  // 处理软件/硬件订单：设置过滤条件后渲染订单页
  if (page === 'orders-software') {
    if (typeof setOrderFilterAndRender === 'function') { setOrderFilterAndRender('software'); }
    else if (typeof renderOrders === 'function') { window.orderFilter = 'software'; renderOrders(); }
  } else if (page === 'orders-hardware') {
    if (typeof setOrderFilterAndRender === 'function') { setOrderFilterAndRender('hardware'); }
    else if (typeof renderOrders === 'function') { window.orderFilter = 'hardware'; renderOrders(); }
  }

  // 移动端：关闭侧边菜单
  if (window.innerWidth < 768) closeMobileMenu();

  // 更新移动端顶部标题
  var titles = {
    dashboard:'工作台', customers:'客户管理', orders:'订单管理',
    'orders-software':'软件订单', 'orders-hardware':'硬件订单',
    cards:'卡密库', products:'商品管理', 'product-sales':'产品销售',
    stats:'数据统计', settings:'系统设置'
  };
  var el = document.getElementById('mobile-header-title');
  if (el) el.textContent = titles[page] || page;

  // 更新侧边栏导航高亮
  document.querySelectorAll('.sidebar .nav-item').forEach(function(item) {
    item.classList.toggle('active', item.dataset.page === page);
  });
  // 更新底部导航激活状态
  document.querySelectorAll('.mobile-nav-item').forEach(function(item) {
    item.classList.toggle('active', item.dataset.page === page);
  });
};

// 关闭下拉菜单（点击外部）
document.addEventListener('click', function(e) {
  if (!e.target.closest('[id$="-dropdown"]') && !e.target.closest('#of-cardSearch') && !e.target.closest('#nc-search')) {
    document.querySelectorAll('.custom-dropdown').forEach(function(d){ d.style.display = 'none'; });
  }
});

// 初始化应用
document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
