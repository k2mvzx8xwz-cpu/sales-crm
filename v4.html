<script>
// 登录认证检查：未登录或会话过期则跳转 login.html（含自动登录）
(function() {
  try {
    const session = JSON.parse(localStorage.getItem('auth_session') || 'null');
    // 检查会话存在、用户名存在、且未过期（expiresAt=0表示永久记住，>0则需校验）
    const valid = session && session.username &&
      (session.expiresAt === 0 || session.expiresAt > Date.now());
    if (!valid) {
      sessionStorage.setItem('auth_redirect', location.pathname.replace(/^.*\//, ''));
      location.href = 'login.html?v=' + Date.now();
    }
  } catch(e) {
    sessionStorage.setItem('auth_redirect', 'v4.html');
    location.href = 'login.html?v=' + Date.now();
  }
})();
</script>

<script>
function toggleMobileMenu() {
  var sidebar = document.getElementById('sidebar');
  var overlay = document.getElementById('sidebar-overlay');
  var isOpen = sidebar.classList.contains('mobile-open');
  if (isOpen) { closeMobileMenu(); }
  else {
    sidebar.classList.add('mobile-open');
    overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
  }
}
function closeMobileMenu() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

var _origNavigateTo = navigateTo;
navigateTo = function(page) {
  // 记录是从哪里进入订单页的，用于 renderOrders 决定是否显示筛选标签栏
  if (page === 'orders-software') { window.ordersViewMode = 'software'; orderFilter = 'software'; orderPage = 1; }
  else if (page === 'orders-hardware') { window.ordersViewMode = 'hardware'; orderFilter = 'hardware'; orderPage = 1; }
  else if (page === 'orders') { window.ordersViewMode = 'all'; orderFilter = 'all'; orderPage = 1; }
  else { window.ordersViewMode = null; }
  _origNavigateTo(page);
  if (page === 'orders-software' || page === 'orders-hardware' || page === 'orders') {
    if (typeof renderOrders === 'function') renderOrders();
  }
  if (window.innerWidth < 768) closeMobileMenu();
  var titles = {
    dashboard:'工作台', customers:'客户管理', orders:'订单管理',
    'orders-software':'软件订单', 'orders-hardware':'硬件订单',
    cards:'卡密库', products:'商品管理', 'product-sales':'产品销售',
    stats:'数据统计', settings:'系统设置'
  };
  var el = document.getElementById('mobile-header-title');
  if (el) el.textContent = titles[page] || page;
  document.querySelectorAll('.sidebar .nav-item').forEach(function(item) {
    item.classList.toggle('active', item.dataset.page === page);
  });
  document.querySelectorAll('.mobile-nav-item').forEach(function(item) {
    item.classList.toggle('active', item.dataset.page === page);
  });
};

document.addEventListener('click', function(e) {
  if (!e.target.closest('[id$="-dropdown"]') && !e.target.closest('#of-cardSearch') && !e.target.closest('#nc-search')) {
    document.querySelectorAll('.custom-dropdown').forEach(function(d){ d.style.display = 'none'; });
  }
});
document.addEventListener('DOMContentLoaded', initApp);

// ========== 移动端下拉刷新 ==========
(function() {
  var ptr = document.createElement('div');
  ptr.id = 'pull-refresh-tip';
  ptr.innerHTML = '<svg id="ptr-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform 0.2s;"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg><span id="ptr-text">下拉刷新</span>';
  ptr.style.cssText = 'position:fixed;top:-52px;left:0;right:0;z-index:2000;display:flex;align-items:center;justify-content:center;gap:8px;height:52px;background:var(--bg-secondary);color:var(--text-secondary);font-size:13px;border-bottom:1px solid var(--border);transition:top 0.2s;pointer-events:none;';
  document.body.appendChild(ptr);

  var startY = 0, pulling = false, threshold = 70, maxPull = 90;
  var mc = document.getElementById('main-content');

  document.addEventListener('touchstart', function(e) {
    if (mc.scrollTop === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var dist = Math.min(e.touches[0].clientY - startY, maxPull);
    if (dist <= 0) return;
    var progress = Math.min(dist / threshold, 1);
    ptr.style.top = (dist - 52) + 'px';
    var arrow = document.getElementById('ptr-arrow');
    var text = document.getElementById('ptr-text');
    if (dist >= threshold) {
      arrow.style.transform = 'rotate(180deg)';
      text.textContent = '释放刷新';
    } else {
      arrow.style.transform = 'rotate(0deg)';
      text.textContent = '下拉刷新';
    }
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!pulling) return;
    var dist = e.changedTouches[0].clientY - startY;
    pulling = false;
    if (dist >= threshold) {
      document.getElementById('ptr-text').textContent = '正在刷新...';
      document.getElementById('ptr-arrow').style.animation = 'spin 0.8s linear infinite';
      if (!document.getElementById('ptr-spin-style')) {
        var s = document.createElement('style');
        s.id = 'ptr-spin-style';
        s.textContent = '@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}';
        document.head.appendChild(s);
      }
      setTimeout(function() {
        if (typeof syncNow === 'function') { syncNow(); }
        else { location.reload(); }
        ptr.style.top = '-52px';
        document.getElementById('ptr-arrow').style.animation = '';
      }, 800);
    } else {
      ptr.style.top = '-52px';
    }
  }, { passive: true });
})();
</script>
