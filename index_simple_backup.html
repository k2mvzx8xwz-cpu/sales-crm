<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>销售客户管理系统 - 简化版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    
    /* Loading 屏 */
    #app-loading { position: fixed; inset: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; transition: opacity 0.3s; }
    #app-loading .logo { width: 64px; height: 64px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    #app-loading .logo::after { content: '📊'; font-size: 32px; }
    #app-loading h1 { font-size: 24px; margin-bottom: 8px; }
    #app-loading p { color: #94a3b8; margin-bottom: 20px; }
    #app-loading .spinner { width: 40px; height: 40px; border: 3px solid #1e293b; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* 主布局 */
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: #1e293b; padding: 20px; }
    .sidebar h2 { font-size: 18px; margin-bottom: 20px; color: #60a5fa; }
    .nav-item { padding: 12px 16px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .nav-item:hover { background: #334155; }
    .nav-item.active { background: #3b82f6; }
    
    .main { flex: 1; padding: 24px; }
    .page-section { display: none; }
    .page-section.active { display: block; }
    
    .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card h3 { margin-bottom: 12px; color: #60a5fa; }
    
    button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <!-- Loading 屏 -->
  <div id="app-loading">
    <div class="logo"></div>
    <h1>销售客户管理系统</h1>
    <p>正在加载数据...</p>
    <div class="spinner"></div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <h2>📊 管理系统</h2>
      <div class="nav-item active" data-page="dashboard">工作台</div>
      <div class="nav-item" data-page="customers">客户管理</div>
      <div class="nav-item" data-page="orders">订单管理</div>
      <div class="nav-item" data-page="settings">系统设置</div>
    </aside>
    
    <main class="main">
      <section id="page-dashboard" class="page-section active">
        <h2>工作台</h2>
        <div class="card">
          <h3>欢迎使用</h3>
          <p>系统已简化，仅用于测试 loading 屏是否能正常隐藏。</p>
          <button onclick="addTestData()">添加测试数据</button>
        </div>
        <div class="card">
          <h3>统计数据</h3>
          <p>客户数: <span id="customer-count">0</span></p>
          <p>订单数: <span id="order-count">0</span></p>
        </div>
      </section>
      
      <section id="page-customers" class="page-section">
        <h2>客户管理</h2>
        <div class="card">
          <p>客户列表将显示在这里...</p>
        </div>
      </section>
      
      <section id="page-orders" class="page-section">
        <h2>订单管理</h2>
        <div class="card">
          <p>订单列表将显示在这里...</p>
        </div>
      </section>
      
      <section id="page-settings" class="page-section">
        <h2>系统设置</h2>
        <div class="card">
          <p>设置选项将显示在这里...</p>
        </div>
      </section>
    </main>
  </div>

  <!-- 独立安全网：不依赖任何外部JS，10秒后强制隐藏loading -->
  <script>
    (function() {
      setTimeout(function() {
        var el = document.getElementById('app-loading');
        if (el) {
          el.style.opacity = '0';
          setTimeout(function() { el.style.display = 'none'; }, 300);
        }
      }, 3000); // 3秒后强制隐藏，用于测试
    })();
  </script>

  <script>
    // 全局数据
    window.APP = { db: { customers: [], orders: [], settings: {} } };
    
    // 导航切换
    function navigateTo(page) {
      document.querySelectorAll('.page-section').forEach(function(el) { el.classList.remove('active'); });
      document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
      
      var target = document.getElementById('page-' + page);
      if (target) target.classList.add('active');
      
      document.querySelector('.nav-item[data-page="' + page + '"]').classList.add('active');
    }
    
    // 点击导航
    document.querySelectorAll('.nav-item').forEach(function(item) {
      item.addEventListener('click', function() {
        navigateTo(this.dataset.page);
      });
    });
    
    // 添加测试数据
    function addTestData() {
      window.APP.db.customers.push({ id: Date.now(), name: '测试客户' + Math.floor(Math.random()*100) });
      window.APP.db.orders.push({ id: Date.now(), amount: Math.floor(Math.random()*1000) });
      updateStats();
    }
    
    // 更新统计
    function updateStats() {
      document.getElementById('customer-count').textContent = window.APP.db.customers.length;
      document.getElementById('order-count').textContent = window.APP.db.orders.length;
    }
    
    // 初始化
    function initApp() {
      console.log('initApp 开始执行');
      updateStats();
      
      // 隐藏 loading 屏
      var loadingEl = document.getElementById('app-loading');
      if (loadingEl) {
        loadingEl.style.opacity = '0';
        setTimeout(function() { loadingEl.style.display = 'none'; }, 300);
      }
      console.log('initApp 执行完成，loading 屏已隐藏');
    }
    
    // DOM 加载完成后初始化
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  </script>
</body>
</html>
